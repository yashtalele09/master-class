backend:
  name: proxy
  proxy_url: http://localhost:8081/api/v1

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "landing"
    label: "Landing Page"
    files:
      - file: "content/landing.json"
        label: "Content"
        name: "landing"
        fields:
          - label: "Masterclass"
            name: "masterclass"
            widget: "object"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Tagline"
                name: "tagline"
                widget: "string"
              - label: "Date"
                name: "date"
                widget: "datetime"
              - label: "Time"
                name: "time"
                widget: "string"
              - label: "Duration"
                name: "duration"
                widget: "string"
              - label: "Mode"
                name: "mode"
                widget: "string"
              - label: "Language"
                name: "language"
                widget: "string"
              - label: "Price"
                name: "price"
                widget: "string"
              - label: "Original Price"
                name: "original_price"
                widget: "string"

          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - label: "Headline"
                name: "headline"
                widget: "string"
              - label: "Subheadline"
                name: "subheadline"
                widget: "string"
              - label: "CTA Button Text"
                name: "cta_text"
                widget: "string"
              - label: "CTA Subtext"
                name: "cta_subtext"
                widget: "string"
              - label: "Urgency Badge"
                name: "urgency_badge"
                widget: "string"

          - label: "Instructor"
            name: "instructor"
            widget: "object"
            fields:
              - label: "Name"
                name: "name"
                widget: "string"
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Bio"
                name: "bio"
                widget: "text"
              - label: "Image URL"
                name: "image"
                widget: "string"
              - label: "Credentials"
                name: "credentials"
                widget: "list"
                fields:
                  - label: "Point"
                    name: "point"
                    widget: "string"

          - label: "What You'll Learn"
            name: "what_you_learn"
            widget: "object"
            fields:
              - label: "Headline"
                name: "headline"
                widget: "string"
              - label: "Points"
                name: "points"
                widget: "list"
                fields:
                  - label: "Title"
                    name: "title"
                    widget: "string"
                  - label: "Description"
                    name: "description"
                    widget: "string"

          - label: "Curriculum"
            name: "curriculum"
            widget: "object"
            fields:
              - label: "Headline"
                name: "headline"
                widget: "string"
              - label: "Modules"
                name: "modules"
                widget: "list"
                fields:
                  - label: "Time"
                    name: "time"
                    widget: "string"
                  - label: "Title"
                    name: "title"
                    widget: "string"
                  - label: "Description"
                    name: "description"
                    widget: "string"

          - label: "Social Proof"
            name: "social_proof"
            widget: "object"
            fields:
              - label: "Headline"
                name: "headline"
                widget: "string"
              - label: "Stats"
                name: "stats"
                widget: "list"
                fields:
                  - label: "Number"
                    name: "number"
                    widget: "string"
                  - label: "Label"
                    name: "label"
                    widget: "string"
              - label: "Testimonials"
                name: "testimonials"
                widget: "list"
                fields:
                  - label: "Name"
                    name: "name"
                    widget: "string"
                  - label: "Title"
                    name: "title"
                    widget: "string"
                  - label: "Avatar"
                    name: "avatar"
                    widget: "string"
                  - label: "Quote"
                    name: "quote"
                    widget: "text"

          - label: "Who Is This For"
            name: "who_is_this_for"
            widget: "object"
            fields:
              - label: "Headline"
                name: "headline"
                widget: "string"
              - label: "Audience"
                name: "audience"
                widget: "list"
                fields:
                  - label: "Point"
                    name: "point"
                    widget: "string"
              - label: "Not For"
                name: "not_for"
                widget: "list"
                fields:
                  - label: "Point"
                    name: "point"
                    widget: "string"

          - label: "FAQ"
            name: "faq"
            widget: "object"
            fields:
              - label: "Headline"
                name: "headline"
                widget: "string"
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - label: "Question"
                    name: "question"
                    widget: "string"
                  - label: "Answer"
                    name: "answer"
                    widget: "text"

          - label: "Register Form"
            name: "register_form"
            widget: "object"
            fields:
              - label: "Headline"
                name: "headline"
                widget: "string"
              - label: "Subheadline"
                name: "subheadline"
                widget: "string"
              - label: "Button Text"
                name: "button_text"
                widget: "string"
              - label: "Success Message"
                name: "success_message"
                widget: "string"
              - label: "Fields Note"
                name: "fields_note"
                widget: "string"

          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - label: "Company Name"
                name: "company_name"
                widget: "string"
              - label: "Tagline"
                name: "tagline"
                widget: "string"
              - label: "Refund Policy"
                name: "refund_policy"
                widget: "string"

          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - label: "Meta Title"
                name: "title"
                widget: "string"
              - label: "Meta Description"
                name: "description"
                widget: "text"
              - label: "OG Image"
                name: "og_image"
                widget: "string"
